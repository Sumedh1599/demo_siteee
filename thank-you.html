<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - Verbll AI</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <meta name="theme-color" content="#4a9eff" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: radial-gradient(circle at top right, #1a1f35, #0b0d1a);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 5L55 30L30 55L5 30L30 5Z" fill="none" stroke="rgba(74,158,255,0.03)" stroke-width="1"/></svg>');
            opacity: 0.5;
            pointer-events: none;
        }

        .thank-you-container {
            background: rgba(18, 22, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(74, 158, 255, 0.1);
            text-align: center;
            max-width: 520px;
            margin: 20px;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .checkmark-wrapper {
            margin-bottom: 32px;
            position: relative;
        }

        .checkmark-circle {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: linear-gradient(135deg, #4a9eff, #6c5ce7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px -5px rgba(74, 158, 255, 0.3);
            position: relative;
        }

        .checkmark-circle::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4a9eff, #6c5ce7);
            opacity: 0.3;
            filter: blur(10px);
            z-index: -1;
        }

        .checkmark-circle svg {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            animation: checkmarkDraw 0.8s ease-out forwards;
        }

        @keyframes checkmarkDraw {
            from {
                stroke-dashoffset: 50;
                stroke-dasharray: 50;
            }
            to {
                stroke-dashoffset: 0;
                stroke-dasharray: 50;
            }
        }

        .thank-you-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .thank-you-message {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 48px;
            line-height: 1.7;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }

        .redirect-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a9eff, #6c5ce7);
            border: none;
            border-radius: 14px;
            padding: 14px 32px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px -5px rgba(74, 158, 255, 0.4);
            width: 100%;
            max-width: 280px;
        }

        .redirect-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .redirect-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(74, 158, 255, 0.5);
        }

        .redirect-button:hover::before {
            left: 100%;
        }

        .redirect-button:active {
            transform: translateY(0);
        }

        .redirect-button span {
            position: relative;
            z-index: 2;
        }

        /* Decorative elements */
        .glow-dot {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(74, 158, 255, 0.1), transparent 70%);
            pointer-events: none;
        }

        .glow-dot-1 {
            top: -50px;
            right: -50px;
        }

        .glow-dot-2 {
            bottom: -50px;
            left: -50px;
            background: radial-gradient(circle at center, rgba(108, 92, 231, 0.1), transparent 70%);
        }

        @media (max-width: 480px) {
            .thank-you-container {
                padding: 40px 24px;
            }
            
            .thank-you-title {
                font-size: 2.5rem;
            }
            
            .thank-you-message {
                font-size: 1rem;
                margin-bottom: 40px;
            }
            
            .redirect-button {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="glow-dot glow-dot-1"></div>
    <div class="glow-dot glow-dot-2"></div>
    
    <div class="thank-you-container">
        <div class="checkmark-wrapper">
            <div class="checkmark-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M20 6L9 17L4 12" stroke="white" stroke-width="2.5" fill="none" />
                </svg>
            </div>
        </div>
        
        <h1 class="thank-you-title">Thank You!</h1>
        
        <p class="thank-you-message">
            You've successfully signed up for early access to Verbll AI.<br>
            We'll notify you as soon as access is available.
        </p>
        
        <a href="https://www.verbll.com" class="redirect-button">
            <span>Return to Verbll AI</span>
        </a>
    </div>
</body>
</html>
